<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <title>SNS Animate</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F2040"/>
      <stop offset="100%" stop-color="#1A3A68"/>
    </linearGradient>
    <radialGradient id="gold" cx="38%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#EDD06E"/>
      <stop offset="100%" stop-color="#A87828"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Timeline track (subtle horizontal rule) -->
  <rect x="3" y="15.25" width="26" height="1.5" rx="0.75" fill="#2A5080" opacity="0.65"/>

  <!-- Diamond keyframe outline — hollow via evenodd -->
  <path
    d="M16,4.5 L27.5,16 L16,27.5 L4.5,16 Z
       M16,9.5 L22.5,16 L16,22.5 L9.5,16 Z"
    fill="white"
    fill-rule="evenodd"
  />

  <!-- Gold center dot -->
  <circle cx="16" cy="16" r="3.5" fill="url(#gold)"/>
</svg>
